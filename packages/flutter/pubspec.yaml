name: gym_tracker
description: Gym Tracker — entrenamiento, nutrición y progreso personal.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # Navegación
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # Persistencia
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  hive_flutter: ^1.1.0

  # Firebase / FCM
  firebase_core: ^3.14.0
  firebase_messaging: ^15.2.5

  # Gráficos
  fl_chart: ^0.70.2

  # SVG (mapa muscular)
  flutter_svg: ^2.0.17

  # Cámara / media
  image_picker: ^1.1.2

  # Audio (rest timer)
  audioplayers: ^6.4.0

  # Conectividad (sync offline)
  connectivity_plus: ^6.1.4

  # Utilidades
  intl: ^0.20.2
  collection: ^1.19.1
  equatable: ^2.0.7

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/

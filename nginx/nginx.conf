user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;

    # Rate limiting zones (5 req/min para auth, 10 req/s para API general)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options          "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "camera=(), microphone=()"        always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/css application/javascript application/json image/svg+xml;

        # Health check (sin logs, sin auth)
        location = /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Activos con hash de Vite: cache agresivo
        location ~* \.(js|css|woff2?|png|svg|ico|webp)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Service Worker: nunca cachear
        location = /sw.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store";
        }

        # Resolver DNS interno de Docker (evita caídas si el backend se reinicia)
        resolver 127.0.0.11 valid=10s;

        # Auth — límite estricto: 5 req/min por IP (burst 10)
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            set $backend "http://api:3001";
            rewrite ^/api/(.*) /$1 break;
            client_max_body_size 1M;
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # API general — 10 req/s por IP (burst 20)
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            set $backend "http://api:3001";
            rewrite ^/api/(.*) /$1 break;
            client_max_body_size 15M;
            proxy_pass         $backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection keep-alive;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # SPA: todas las rutas al index.html
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store";
        }
    }
}
